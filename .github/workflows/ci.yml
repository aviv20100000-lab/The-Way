name: ci

# Runs type checking and the existing Jest test suite on every push and PR.
# Does not run `npm run build` — that needs real API keys (ANTHROPIC_API_KEY,
# TURSO_TOKEN, etc.) that aren't configured as CI secrets, so it would fail
# for reasons unrelated to code correctness.
# This is a status check only — it does not deploy anything and does not
# block the separate Vercel auto-deploy that runs on push to main.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Run tests
        run: npm test

      - name: Send Telegram alert on failure
        if: failure() && github.ref == 'refs/heads/main'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            --data '{"chat_id":"'"${TG_CHAT}"'","text":"🚨 THE WAY — טסטים או type-check נכשלו אחרי push ל-main. יש לבדוק ב-GitHub Actions."}' >/dev/null
